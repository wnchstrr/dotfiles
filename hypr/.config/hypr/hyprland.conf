###################
### MONITORS ###
###################
monitor = , preferred, auto, 1
monitor = HDMI-A-1, disable

###################
### NVIDIA ENV ###
###################
# критично для NVIDIA на Wayland — без этого глюки/чёрный экран
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
cursor {
    no_hardware_cursors = false
}


###################
### INPUT ###
###################
input {
    kb_layout = us,ru
    kb_options = grp:caps_toggle    # CapsLock переключает us/ru
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 35
    repeat_delay = 300

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
        tap-to-click = true
        disable_while_typing = true
    }
}

###################
### KEYBOARD LAYOUT INDICATOR (optional) ###
###################

###################
### APPEARANCE ###
###################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 3
    col.active_border = rgba(89ddffee) rgba(5fb3a1ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = 0.88
    inactive_opacity = 0.82
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

###################
### KEYBINDINGS ###
###################
$mod = ALT
$terminal = ghostty
$browser = google-chrome
$fileManager = nemo
$claude = google-chrome --app=https://claude.ai
$music = spotify
$obsidian = $HOME/Apps/Obsidian-1.12.7.AppImage --no-sandbox

###################
### AUTOSTART ###
###################
exec-once = swaybg -i $HOME/Pictures/Wallpapers/wall.png -m fill
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = playerctld daemon
exec-once = hypridle

# Основное
bind = $mod, Return, exec, $terminal       # терминал
bind = $mod, t, exec, $terminal
bind = $mod, Q, killactive,                # закрыть окно
bind = $mod, M, exec, $music             # музыка (Spotify)
bind = $mod SHIFT, Q, exit,                # ВЫХОД из Hyprland (парашют)
bind = $mod, E, exec, $fileManager           # файловый менеджер (nemo)
bind = $mod, D, exec, rofi -show drun
bind = $mod SHIFT, D, exec, rofi -show run
bind = $mod, V, togglefloating,            # плавающее окно
bind = $mod, F, fullscreen,                # на весь экран
bind = $mod, J, togglesplit,               # сменить направление сплита

# Навигация между окнами (vi-style + стрелки)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u

# Перемещение окон
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Рабочие столы (Super + 1..5)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Переместить окно на рабочий стол
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Громкость / яркость (мультимедиа-клавиши)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPause, exec, playerctl play-pause
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Блокировка экрана
bind = $mod, X, exec, hyprlock

# Мышь: перетаскивание/ресайз окон
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize (Super+Ctrl+стрелки)
bind = $mod CTRL, left, resizeactive, -40 0
bind = $mod CTRL, right, resizeactive, 40 0
bind = $mod CTRL, up, resizeactive, 0 -40
bind = $mod CTRL, down, resizeactive, 0 40

# Scratchpad
bind = $mod, S, togglespecialworkspace, scratch
bind = $mod SHIFT, S, movetoworkspace, special:scratch

# Скрипты
bind = $mod, W, exec, ~/.local/bin/whisper-clip.sh
bind = CTRL ALT, V, exec, ~/.config/hypr/Scripts/clipmenu.sh

# Swaync
bind = $mod, N, exec, swaync-client -t

# Hyprpicker
bind = $mod SHIFT, C, exec, hyprpicker -a

###################
### WINDOW RULES ###
###################
# Прозрачность терминалов
windowrule = opacity 0.90 0.90, match:class com.mitchellh.ghostty
windowrule = opacity 0.92 0.92, match:class org.wezfurlong.wezterm

# Плавающие окна
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = size 800 600, match:class org.pulseaudio.pavucontrol
windowrule = center 1, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:class nemo
windowrule = size 900 600, match:class nemo
windowrule = opacity 0.82 0.82, match:class nemo
windowrule = float on, match:class AmneziaVPN
# Thunderbird
windowrule = float on, match:class thunderbird_thunderbird
windowrule = size 1300 950, match:class thunderbird_thunderbird
windowrule = center 1, match:class thunderbird_thunderbird
windowrule = opacity 0.95 0.95, match:class thunderbird_thunderbird


###################
### SCREENSHOTS ###
###################
# Область → буфер обмена
bind = , Print, exec, hyprshot -m region --clipboard-only
# Область → файл (~/Pictures/Screenshots/)
bind = SHIFT, Print, exec, hyprshot -m region -o ~/Pictures/Screenshots
# Активное окно → буфер обмена
bind = $mod, Print, exec, hyprshot -m window --clipboard-only
# Весь экран → файл (~/Pictures/Screenshots/)
bind = CTRL, Print, exec, hyprshot -m output -o ~/Pictures/Screenshots

# Управление музыкой (Super)
bind = $mod, P, exec, playerctl play-pause
bind = $mod, bracketright, exec, playerctl next
bind = $mod, bracketleft, exec, playerctl previous

###################
### GESTURES ###
###################
gesture = 3, horizontal, workspace

# Приложения
bind = $mod, O, exec, $obsidian
bind = $mod, B, exec, $browser
bind = $mod, A, exec, $claude

# Листать рабочие столы колесом мыши (Super+scroll)
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

###################
### POWER SUBMAP ###
###################
# Вход в режим питания: Super+Shift+P
bind = $mod SHIFT, P, submap, power

submap = power
bind = , s, exec, systemctl suspend
bind = , s, submap, reset
bind = , p, exec, systemctl poweroff
bind = , r, exec, systemctl reboot
bind = , e, exec, loginctl terminate-user $USER
bind = , escape, submap, reset
bind = , q, submap, reset
submap = reset
